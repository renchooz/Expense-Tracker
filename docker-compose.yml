services:
  mongo:
    image: mongo:7
    container_name: fintrack-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: server
    container_name: fintrack-api
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      CLIENT_URL: http://localhost:8080
      COOKIE_SECURE: "false"
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"

  web:
    build:
      context: .
      target: web
      args:
        VITE_API_URL: /api
    container_name: fintrack-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mongo_data:
